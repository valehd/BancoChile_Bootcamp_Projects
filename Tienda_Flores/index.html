<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <link rel="stylesheet" href="css/styles.css">
    <title>Examen 3</title>
</head>
<body>
<header>
    <div class="top-bar">  
    <h1>Flor<span>Mania</span></h1>
   
    <nav class="login">
        <ul>
            <li id="enviaflores">Envía Flores</li>
            <li>Nosotros</li>
            <li><button class="sesion" id="iniciosesion">Iniciar sesion</button></li>

        </ul>
    </nav>
    </div>
    <nav class="menu">
        <ul>
            <li>Girasoles</li>
            <li>Rosas</li>
            <li>Claveles</li>
            <li>Tulipanes</li>
            <li>Lirios</li>
            <li>Orquídeas</li>
            <li>Margaritas</li>
        </ul>
    </nav>
    </header>
    <main>
        
        <section class="titulo">
            <h2>Flor del Mes</h2>
            <img src="imgs/flor-del-mes.jpg" alt="flor del mes">

        </section>
        <section class="segundamitad">
            <div class="resultados">
                <p> Mostrar resultados</p>
                <a href="#">Ver más flores</a>
            </div>
            <article class="productos">
                <div class="fotos">
                    <img src="imgs/ramo-de-rosas.jpg" alt="rosas">
                    
                    <div class="informacion">
<h3>Ramo de Rosas</h3>
                    <p>$40.00</p>
                    </div>
                    <button class="comprar">Comprar</button>

                </div>
                <div class="fotos">
                    <img src="imgs/arreglo-tulipanes.jpg" alt="tulipanes">
                    <h3>Arreglo Tulipanes</h3>
                    <p>$50.00</p>
                    <button class="comprar">Comprar</button>
                </div>
                <div class="fotos">
                    <img src="imgs/bouquet-lirios.jpg" alt="lirios">
                    <h3>Bouquet Lirios</h3>
                    <p>$25.00</p>
                    <button class="comprar">Comprar</button>
                </div>
            </article>
            <footer></footer>

        </section>

    </main>


    <script src="js/main.js" defer> </script>
</body>
</html>
